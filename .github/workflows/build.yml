name: Build Parsec Android APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "26.3.11579264"
  RUST_VERSION: "1.86.0"

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Gradle) ────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle setup ──────────────────────────────────────────────────────────
      # Official action: downloads Gradle 8.6, no wrapper jar needed.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      # ── Android SDK / NDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"          >> $GITHUB_ENV

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"

      # ── Cargo linker + CC config ─────────────────────────────────────────────
      # Sets both the Cargo linker (used by rustc) and CC/AR env vars (used by
      # ring's cc-rs build script, which searches independently of the linker).
      - name: Configure Cargo for Android cross-compilation
        run: |
          mkdir -p ~/.cargo
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$NDK_TOOLCHAIN/aarch64-linux-android26-clang"
          ar     = "$NDK_TOOLCHAIN/llvm-ar"

          [target.x86_64-linux-android]
          linker = "$NDK_TOOLCHAIN/x86_64-linux-android26-clang"
          ar     = "$NDK_TOOLCHAIN/llvm-ar"
          EOF

          # Export CC/AR so ring/cc-rs can find the compiler without PATH search
          echo "CC_aarch64_linux_android=$NDK_TOOLCHAIN/aarch64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$NDK_TOOLCHAIN/aarch64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK_TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "CC_x86_64_linux_android=$NDK_TOOLCHAIN/x86_64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_x86_64_linux_android=$NDK_TOOLCHAIN/x86_64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=$NDK_TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          # Also add toolchain to PATH as a fallback
          echo "$NDK_TOOLCHAIN" >> $GITHUB_PATH

      # ── Rust check ──────────────────────────────────────────────────────────
      - name: cargo check (aarch64-linux-android)
        working-directory: src-rust
        run: cargo check --target aarch64-linux-android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── Gradle build ────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: parsec-browser-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Build summary ────────────────────────────────────────────────────────
      - name: APK info
        if: success()
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **APK built successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(du -sh $APK | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
